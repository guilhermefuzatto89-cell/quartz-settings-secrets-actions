name: Deploy to VPS

on:
  push:
    branches:
      - v4

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/quartz
            git pull
            npm ci --prefer-offline
            npx quartz build
            echo "Deploy concluído em $(date)"
